<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Health — Multi-Emby Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d14; color: #d0d0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; padding: 2rem 1rem;
    }
    a { color: #7b61ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header {
      max-width: 860px; margin: 0 auto 2rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .page-title { font-size: 1.35rem; font-weight: 700; color: #fff; }
    .page-sub { font-size: 0.8rem; color: #555; margin-top: 0.2rem; }
    .header-actions { display: flex; gap: 0.6rem; align-items: center; }

    .btn {
      background: #1a1a28; border: 1px solid #2a2a3a; color: #aaa;
      border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #22222e; color: #ddd; border-color: #3a3a55; }
    .btn.primary { border-color: #7b61ff; color: #7b61ff; }
    .btn.primary:hover { background: #1a1a30; color: #9a80ff; }
    .btn.danger { border-color: #e05555; color: #e05555; }
    .btn.danger:hover { background: #1e1010; }

    /* ── Config bar ── */
    .config-bar {
      max-width: 860px; margin: 0 auto 1.5rem;
      background: #1a1a23; border: 1px solid #2a2a38; border-radius: 12px;
      padding: 1rem 1.25rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
    }
    .config-bar label { font-size: 0.8rem; color: #777; white-space: nowrap; }
    .config-bar input {
      flex: 1; min-width: 220px; background: #0f0f1a; border: 1px solid #2a2a3a;
      border-radius: 7px; padding: 0.45rem 0.75rem; color: #d0d0e0; font-size: 0.82rem;
    }
    .config-bar input:focus { outline: none; border-color: #7b61ff; }
    .config-status { font-size: 0.78rem; color: #555; }
    .config-status.ok { color: #4caf7d; }
    .config-status.err { color: #e05555; }

    /* ── Server grid ── */
    .server-grid {
      max-width: 860px; margin: 0 auto;
      display: grid; gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    }

    .server-card {
      background: #1a1a23; border: 1px solid #2a2a38; border-radius: 12px;
      padding: 1.1rem 1.3rem 1.2rem; position: relative;
    }
    .server-card.up   { border-left: 3px solid #4caf7d; }
    .server-card.down { border-left: 3px solid #e05555; }
    .server-card.unknown { border-left: 3px solid #444; }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .card-name { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .card-type { font-size: 0.72rem; color: #555; background: #13131c; border: 1px solid #2a2a3a;
      border-radius: 4px; padding: 0.1rem 0.4rem; margin-left: 0.4rem; }
    .card-url  { font-size: 0.75rem; color: #444; margin-bottom: 0.6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.up   { background: #4caf7d; box-shadow: 0 0 6px #4caf7d88; }
    .status-dot.down { background: #e05555; box-shadow: 0 0 6px #e0555588; }
    .status-dot.unknown { background: #444; }
    .status-text { font-size: 0.85rem; font-weight: 600; }
    .status-text.up   { color: #4caf7d; }
    .status-text.down { color: #e05555; }
    .status-text.unknown { color: #666; }
    .ping-ms { font-size: 0.8rem; color: #777; margin-left: auto; }
    .ping-ms.fast { color: #4caf7d; }
    .ping-ms.ok   { color: #f0a500; }
    .ping-ms.slow { color: #e05555; }

    .uptime-bar {
      display: flex; gap: 2px; margin-bottom: 0.5rem; height: 24px; align-items: flex-end;
    }
    .uptime-seg {
      flex: 1; border-radius: 2px; cursor: default; min-height: 4px;
      transition: opacity 0.15s;
    }
    .uptime-seg:hover { opacity: 0.75; }
    .uptime-seg.up    { background: #4caf7d; height: 100%; }
    .uptime-seg.down  { background: #e05555; height: 60%; }
    .uptime-seg.empty { background: #1e1e2a; height: 30%; }

    .uptime-legend {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: #444; margin-bottom: 0.5rem;
    }

    .card-meta { font-size: 0.72rem; color: #444; }
    .card-meta span { margin-right: 0.75rem; }

    /* ── Empty / loading state ── */
    .empty-state {
      max-width: 860px; margin: 3rem auto; text-align: center;
      color: #444; font-size: 0.9rem; line-height: 1.8;
    }
    .empty-state .big { font-size: 2rem; margin-bottom: 0.5rem; }

    /* ── Auto-refresh indicator ── */
    .refresh-info {
      max-width: 860px; margin: 1.25rem auto 0;
      font-size: 0.75rem; color: #333; text-align: right;
    }
    .refresh-info span { color: #555; }
  </style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">🖥️ Server Health</div>
    <div class="page-sub">Live status + up/down history for all configured servers</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="pingAll()">Ping Now</button>
    <button class="btn danger" onclick="clearHistory()">Clear History</button>
    <a href="/configure" class="btn">← Configure</a>
  </div>
</div>

<div class="config-bar">
  <label>Install link or config key:</label>
  <input type="text" id="cfg-input" placeholder="Paste your Stremio install link or config key…" oninput="onCfgInput()" />
  <span class="config-status" id="cfg-status"></span>
</div>

<div class="server-grid" id="server-grid">
  <div class="empty-state" style="grid-column:1/-1">
    <div class="big">🔌</div>
    Paste your install link above to load your servers.
  </div>
</div>

<div class="refresh-info" id="refresh-info"></div>

<script>
  // ── Helpers ─────────────────────────────────────────────────────────────────
  function decodeConfig(raw) {
    // Accept full stremio:// URL, https:// URL, or raw base64 key
    let key = raw.trim();
    // stremio://... or https://...  →  extract config segment
    const m = key.match(/\/([A-Za-z0-9_\-]{20,})\/manifest\.json/);
    if (m) key = m[1];
    // also handle bare URL ending in /manifest.json
    const m2 = key.match(/^([A-Za-z0-9_\-]{20,})$/);
    if (!m2) throw new Error('No config key found');
    let b64 = key.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4 !== 0) b64 += '=';
    return JSON.parse(atob(b64));
  }

  const HISTORY_KEY = 'meb-server-history';
  const MAX_HISTORY = 48; // ~48 pings = 24h at 30-min intervals (or ~4h at 5-min)

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveHistory(h) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  }
  function recordPing(serverUrl, up, ms) {
    const h = loadHistory();
    if (!h[serverUrl]) h[serverUrl] = [];
    h[serverUrl].unshift({ ts: Date.now(), up, ms });
    if (h[serverUrl].length > MAX_HISTORY) h[serverUrl] = h[serverUrl].slice(0, MAX_HISTORY);
    saveHistory(h);
  }

  // ── Config input ─────────────────────────────────────────────────────────────
  let servers = [];
  let cfgDebounce = null;

  function onCfgInput() {
    clearTimeout(cfgDebounce);
    cfgDebounce = setTimeout(tryLoadConfig, 400);
  }

  function tryLoadConfig() {
    const raw = document.getElementById('cfg-input').value;
    const statusEl = document.getElementById('cfg-status');
    if (!raw.trim()) {
      statusEl.textContent = '';
      statusEl.className = 'config-status';
      return;
    }
    try {
      const cfg = decodeConfig(raw);
      servers = (cfg.servers || []).filter(s => s.url && s.apiKey);
      if (servers.length === 0) throw new Error('No servers in config');
      statusEl.textContent = `✓ ${servers.length} server${servers.length > 1 ? 's' : ''} loaded`;
      statusEl.className = 'config-status ok';
      renderCards();
      pingAll();
    } catch (e) {
      statusEl.textContent = '✗ Could not decode — paste full install link';
      statusEl.className = 'config-status err';
    }
  }

  // Auto-load from URL query param ?cfg=...
  (function autoLoad() {
    const p = new URLSearchParams(location.search).get('cfg');
    if (p) {
      document.getElementById('cfg-input').value = p;
      tryLoadConfig();
    }
  })();

  // ── Ping single server ───────────────────────────────────────────────────────
  async function pingServer(server) {
    const t0 = performance.now();
    try {
      await fetch(`${server.url}/System/Ping`, { mode: 'no-cors', cache: 'no-store' });
      const ms = Math.round(performance.now() - t0);
      return { up: true, ms };
    } catch {
      return { up: false, ms: null };
    }
  }

  // ── Ping all ─────────────────────────────────────────────────────────────────
  let pinging = false;
  async function pingAll() {
    if (servers.length === 0 || pinging) return;
    pinging = true;
    updateRefreshInfo('Pinging…');
    await Promise.all(servers.map(async (s) => {
      const result = await pingServer(s);
      recordPing(s.url, result.up, result.ms);
      updateCard(s, result);
    }));
    pinging = false;
    updateRefreshInfo(`Last ping: ${new Date().toLocaleTimeString()}`);
  }

  // ── Render all cards from scratch ────────────────────────────────────────────
  function renderCards() {
    const grid = document.getElementById('server-grid');
    grid.innerHTML = '';
    const history = loadHistory();
    for (const s of servers) {
      const card = buildCard(s, history[s.url] || []);
      grid.appendChild(card);
    }
  }

  function buildCard(server, history) {
    const latest = history[0] || null;
    const state  = latest ? (latest.up ? 'up' : 'down') : 'unknown';
    const div = document.createElement('div');
    div.className = `server-card ${state}`;
    div.id = `card-${btoa(server.url).replace(/[^a-z0-9]/gi, '')}`;

    const urlShort = server.url.replace(/^https?:\/\//, '');
    const typeLabel = server.type === 'jellyfin' ? 'Jellyfin' : 'Emby';
    const pingClass = latest?.ms ? (latest.ms < 100 ? 'fast' : latest.ms < 400 ? 'ok' : 'slow') : '';
    const pingText  = latest?.ms ? `${latest.ms}ms` : '';
    const statusText = state === 'up' ? 'Online' : state === 'down' ? 'Offline' : 'Unknown';

    // Build uptime bar (newest on right → reverse history)
    const segments = [...history].reverse();
    const barHtml = Array.from({ length: MAX_HISTORY }, (_, i) => {
      const seg = segments[i];
      if (!seg) return `<div class="uptime-seg empty" title="No data"></div>`;
      const ts = new Date(seg.ts).toLocaleString();
      const cls = seg.up ? 'up' : 'down';
      const tip = `${ts} — ${seg.up ? `Online (${seg.ms}ms)` : 'Offline'}`;
      return `<div class="uptime-seg ${cls}" title="${tip}"></div>`;
    }).join('');

    const lastSeen = latest ? new Date(latest.ts).toLocaleTimeString() : 'Never';
    const upCount  = history.filter(h => h.up).length;
    const pct      = history.length ? Math.round(upCount / history.length * 100) : null;

    div.innerHTML = `
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:0.4rem">
          <span class="card-name">${escHtml(server.label || urlShort)}</span>
          <span class="card-type">${typeLabel}</span>
        </div>
      </div>
      <div class="card-url" title="${escHtml(server.url)}">${escHtml(urlShort)}</div>
      <div class="status-row">
        <div class="status-dot ${state}"></div>
        <span class="status-text ${state}">${statusText}</span>
        ${pingText ? `<span class="ping-ms ${pingClass}">${pingText}</span>` : ''}
      </div>
      <div class="uptime-legend">
        <span>${history.length ? new Date(history[history.length-1].ts).toLocaleDateString() : '—'}</span>
        <span>${pct !== null ? `${pct}% uptime (${history.length} checks)` : 'No history yet'}</span>
        <span>Now</span>
      </div>
      <div class="uptime-bar">${barHtml}</div>
      <div class="card-meta">
        <span>Last checked: ${lastSeen}</span>
        ${pct !== null ? `<span>Up: ${upCount}/${history.length}</span>` : ''}
      </div>
    `;
    return div;
  }

  // ── Update a single card after ping ──────────────────────────────────────────
  function updateCard(server, result) {
    const history = (loadHistory()[server.url] || []);
    const id = `card-${btoa(server.url).replace(/[^a-z0-9]/gi, '')}`;
    const existing = document.getElementById(id);
    if (!existing) return;
    const newCard = buildCard(server, history);
    existing.replaceWith(newCard);
  }

  // ── Clear history ─────────────────────────────────────────────────────────────
  function clearHistory() {
    if (!confirm('Clear all ping history? This cannot be undone.')) return;
    localStorage.removeItem(HISTORY_KEY);
    renderCards();
  }

  // ── Auto-refresh every 5 minutes ─────────────────────────────────────────────
  let countdown = 300;
  function updateRefreshInfo(msg) {
    const el = document.getElementById('refresh-info');
    if (!el) return;
    el.innerHTML = msg ? `<span>${msg}</span>` : '';
  }
  setInterval(() => {
    if (servers.length === 0) return;
    countdown--;
    if (countdown <= 0) {
      countdown = 300;
      pingAll();
    } else {
      updateRefreshInfo(`Next auto-ping in ${countdown}s`);
    }
  }, 1000);

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
