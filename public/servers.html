<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Health — Multi-Emby Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d14; color: #d0d0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; padding: 2rem 1rem;
    }

    .page-header {
      max-width: 880px; margin: 0 auto 1.75rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .page-title { font-size: 1.35rem; font-weight: 700; color: #fff; }
    .page-sub   { font-size: 0.8rem; color: #555; margin-top: 0.2rem; }
    .header-actions { display: flex; gap: 0.6rem; align-items: center; }

    .btn {
      background: #1a1a28; border: 1px solid #2a2a3a; color: #aaa;
      border-radius: 8px; padding: 0.45rem 1rem; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-decoration: none; display: inline-block;
    }
    .btn:hover { background: #22222e; color: #ddd; border-color: #3a3a55; }
    .btn.primary { border-color: #7b61ff; color: #7b61ff; }
    .btn.primary:hover { background: #1a1a30; }
    .btn.danger { border-color: #e05555; color: #e05555; }
    .btn.danger:hover { background: #1e1010; }

    /* ── Status bar ── */
    .status-bar {
      max-width: 880px; margin: 0 auto 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.78rem; color: #444; flex-wrap: wrap; gap: 0.5rem;
    }
    .status-bar .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #333; margin-right: 0.35rem; vertical-align: middle; }
    .status-bar .dot.ok   { background: #4caf7d; box-shadow: 0 0 5px #4caf7d88; }
    .status-bar .dot.warn { background: #f0a500; }
    .status-bar .dot.bad  { background: #e05555; }

    /* ── Server grid ── */
    .server-grid {
      max-width: 880px; margin: 0 auto;
      display: grid; gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    }

    .server-card {
      background: #1a1a23; border: 1px solid #2a2a38; border-radius: 12px;
      padding: 1.1rem 1.3rem 1.2rem;
    }
    .server-card.up      { border-left: 3px solid #4caf7d; }
    .server-card.down    { border-left: 3px solid #e05555; }
    .server-card.unknown { border-left: 3px solid #333; }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
    .card-name-row { display: flex; align-items: center; gap: 0.4rem; }
    .card-name { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .card-type { font-size: 0.7rem; color: #555; background: #13131c; border: 1px solid #222232; border-radius: 4px; padding: 0.1rem 0.4rem; }
    .card-url  { font-size: 0.73rem; color: #3a3a55; margin-bottom: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-row { display: flex; align-items: center; gap: 0.65rem; margin-bottom: 0.7rem; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.up      { background: #4caf7d; box-shadow: 0 0 6px #4caf7d88; }
    .status-dot.down    { background: #e05555; box-shadow: 0 0 6px #e0555588; }
    .status-dot.unknown { background: #333; }
    .status-label { font-size: 0.85rem; font-weight: 600; }
    .status-label.up   { color: #4caf7d; }
    .status-label.down { color: #e05555; }
    .status-label.unknown { color: #555; }
    .ping-ms { font-size: 0.78rem; margin-left: auto; }
    .ping-ms.fast { color: #4caf7d; }
    .ping-ms.ok   { color: #f0a500; }
    .ping-ms.slow { color: #e05555; }

    /* ── Uptime bar ── */
    .uptime-bar {
      display: flex; gap: 2px; height: 26px; align-items: flex-end; margin-bottom: 0.35rem;
    }
    .seg {
      flex: 1; border-radius: 2px; cursor: default;
      transition: opacity 0.12s; position: relative;
    }
    .seg:hover { opacity: 0.7; }
    .seg.up    { background: #4caf7d; height: 100%; }
    .seg.down  { background: #e05555; height: 55%; }
    .seg.empty { background: #1d1d28; height: 25%; }

    .uptime-legend {
      display: flex; justify-content: space-between;
      font-size: 0.69rem; color: #383850; margin-bottom: 0.5rem;
    }

    .card-footer { font-size: 0.71rem; color: #383850; display: flex; gap: 1rem; flex-wrap: wrap; }
    .card-footer .highlight { color: #555; }

    /* ── Empty / loading ── */
    .empty-state {
      max-width: 880px; margin: 3.5rem auto; text-align: center; color: #383850;
      font-size: 0.9rem; line-height: 2;
    }
    .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
    .empty-state a { color: #7b61ff; }

    .loader { text-align: center; color: #444; font-size: 0.85rem; padding: 3rem 0; max-width: 880px; margin: 0 auto; }

    /* ── No servers registered notice ── */
    .notice {
      max-width: 880px; margin: 0 auto 1.5rem;
      background: #13131e; border: 1px solid #2a2a3a; border-radius: 10px;
      padding: 0.9rem 1.2rem; font-size: 0.82rem; color: #666; line-height: 1.6;
    }
    .notice a { color: #7b61ff; }

    /* ── Refresh info ── */
    .refresh-bar {
      max-width: 880px; margin: 1.1rem auto 0;
      font-size: 0.73rem; color: #2e2e42; text-align: right;
    }
  </style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">🖥️ Server Health</div>
    <div class="page-sub" id="page-sub">24/7 uptime monitoring — recorded by the addon server</div>
  </div>
  <div class="header-actions">
    <button class="btn primary" onclick="pingNow()">Ping Now</button>
    <a href="/configure" class="btn">← Configure</a>
  </div>
</div>

<div id="main-content">
  <div class="loader">Loading health data…</div>
</div>

<div class="refresh-bar" id="refresh-bar"></div>

<script>
  const SEGMENTS = 48; // how many history dots to show
  let countdown  = 60; // refresh interval in seconds
  let refreshTimer;

  // ── Load history from backend ─────────────────────────────────────────────
  async function loadHistory() {
    try {
      const data = await fetch('/api/health/history').then(r => r.json());
      renderPage(data);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="empty-state"><span class="icon">⚠️</span>Could not load health data.<br><a href="/configure">← Back to Configure</a></div>`;
    }
  }

  // ── Trigger immediate ping on backend ────────────────────────────────────
  async function pingNow() {
    document.getElementById('refresh-bar').textContent = 'Pinging…';
    try {
      await fetch('/api/health/ping-now', { method: 'POST' });
      await loadHistory();
    } catch {}
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderPage(data) {
    const main = document.getElementById('main-content');

    if (!data || data.length === 0) {
      main.innerHTML = `
        <div class="notice">
          No servers registered for monitoring yet. Go to
          <a href="/configure">Configure</a>, set up your servers, and click
          <strong>Generate Install Link</strong> — servers are automatically registered for 24/7 health tracking.
        </div>
        <div class="empty-state">
          <span class="icon">🔌</span>
          No servers monitored yet.<br>
          Generate your install link on the <a href="/configure">configure page</a> to start monitoring.
        </div>`;
      return;
    }

    const upCount   = data.filter(s => s.history[0]?.up === true).length;
    const downCount = data.filter(s => s.history[0]?.up === false).length;

    let statusHtml = `<div class="status-bar">`;
    statusHtml += `<div>`;
    if (downCount === 0 && upCount > 0) {
      statusHtml += `<span class="dot ok"></span>All ${upCount} server${upCount > 1 ? 's' : ''} online`;
    } else if (downCount > 0 && upCount > 0) {
      statusHtml += `<span class="dot warn"></span>${upCount} online · <span style="color:#e05555">${downCount} offline</span>`;
    } else if (downCount > 0 && upCount === 0) {
      statusHtml += `<span class="dot bad"></span>All servers offline`;
    } else {
      statusHtml += `<span class="dot"></span>Waiting for first ping…`;
    }
    statusHtml += `</div>`;
    statusHtml += `<div style="color:#2e2e42">Pings every 5 min · ${data.reduce((a,s)=>a+s.history.length,0)} total checks recorded</div>`;
    statusHtml += `</div>`;

    const cards = data.map(s => buildCard(s)).join('');
    main.innerHTML = statusHtml + `<div class="server-grid">${cards}</div>`;
  }

  function buildCard(s) {
    const h = s.history || [];
    const latest = h[0] || null;
    const state  = latest ? (latest.up ? 'up' : 'down') : 'unknown';

    const urlShort   = (s.url || '').replace(/^https?:\/\//, '');
    const typeLabel  = s.type === 'jellyfin' ? 'Jellyfin' : 'Emby';
    const pingCls    = latest?.ms != null ? (latest.ms < 100 ? 'fast' : latest.ms < 400 ? 'ok' : 'slow') : '';
    const pingText   = latest?.ms != null ? `${latest.ms}ms` : '';
    const statusText = state === 'up' ? 'Online' : state === 'down' ? 'Offline' : 'Pending…';

    // Uptime bar — show newest on the RIGHT (reverse history, pad with empty)
    const slots   = [...h].reverse().slice(-SEGMENTS);
    const padded  = Array(SEGMENTS - slots.length).fill(null).concat(slots);
    const barHtml = padded.map((entry, i) => {
      if (!entry) return `<div class="seg empty" title="No data"></div>`;
      const ts  = new Date(entry.ts).toLocaleString();
      const cls = entry.up ? 'up' : 'down';
      const tip = entry.up ? `${ts} · Online (${entry.ms}ms)` : `${ts} · Offline`;
      return `<div class="seg ${cls}" title="${escHtml(tip)}"></div>`;
    }).join('');

    // Stats
    const upCount  = h.filter(e => e.up).length;
    const pct      = h.length ? Math.round(upCount / h.length * 100) : null;
    const lastTs   = latest ? new Date(latest.ts).toLocaleTimeString() : 'Never';
    const oldest   = h.length ? new Date(h[h.length-1].ts).toLocaleDateString() : '—';

    return `
    <div class="server-card ${state}">
      <div class="card-header">
        <div class="card-name-row">
          <span class="card-name">${escHtml(s.label || urlShort)}</span>
          <span class="card-type">${typeLabel}</span>
        </div>
      </div>
      <div class="card-url" title="${escHtml(s.url)}">${escHtml(urlShort)}</div>
      <div class="status-row">
        <div class="status-dot ${state}"></div>
        <span class="status-label ${state}">${statusText}</span>
        ${pingText ? `<span class="ping-ms ${pingCls}">${pingText}</span>` : ''}
      </div>
      <div class="uptime-legend">
        <span>${oldest}</span>
        <span>${pct !== null ? `${pct}% uptime · ${h.length} checks` : 'No history yet'}</span>
        <span>Now</span>
      </div>
      <div class="uptime-bar">${barHtml}</div>
      <div class="card-footer">
        <span>Last checked: <span class="highlight">${lastTs}</span></span>
        ${pct !== null ? `<span>Up: <span class="highlight">${upCount}/${h.length}</span></span>` : ''}
      </div>
    </div>`;
  }

  // ── Auto-refresh countdown ─────────────────────────────────────────────────
  function startCountdown() {
    clearInterval(refreshTimer);
    countdown = 60;
    refreshTimer = setInterval(() => {
      countdown--;
      document.getElementById('refresh-bar').textContent =
        `Auto-refresh in ${countdown}s · Backend pings every 5 min`;
      if (countdown <= 0) {
        countdown = 60;
        loadHistory();
      }
    }, 1000);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadHistory().then(() => startCountdown());
</script>
</body>
</html>
